<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리벨류(REVALUE) 스타일 - 명품 최고가 매입</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            margin: 0;
            padding: 40px 0;
        }
        .form-section {
            padding: 20px;
            width: 100%;
        }
        .form-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Comment Section Styles */
        .comment-section {
            width: 100%;
            max-width: 1000px;
            margin: 40px auto 0;
            padding: 40px;
            background-color: #111;
            border-radius: 20px;
            border: 1px solid #222;
            color: #fff;
        }
        .comment-section h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid #333;
        }
        .comment-form input, .comment-form textarea {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #000;
            color: #fff;
            width: 100%;
        }
        .comment-form textarea {
            height: 100px;
            resize: none;
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .comment-item {
            padding: 20px;
            background-color: #1a1a1a;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }
        .comment-item .author {
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent);
        }
        .comment-item .date {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }
        .comment-item .content {
            line-height: 1.5;
        }

        /* Location Section Styles */
        .location-section {
            width: 100%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px;
            background-color: #111;
            border-radius: 20px;
            border: 1px solid #222;
            color: #fff;
        }
        .location-section h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--accent);
        }
        .location-section .address {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #ccc;
        }
        .map-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <!-- Appraisal Form Section -->
    <section id="quote-form-section" class="form-section">
        <div class="container">
            <div class="form-wrapper">
                <div class="form-image">
                    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=1200&q=80" alt="Appraisal Image">
                </div>
                <div class="form-box">
                    <div class="form-header">
                        <h2>지금 바로 시세 확인</h2>
                        <p>성함과 연락처만 남겨주시면 30분 이내로 연락드립니다.</p>
                    </div>
                    <form id="appraisal-form">
                        <div class="input-row">
                            <div class="input-group">
                                <label>성함</label>
                                <input type="text" name="user-name" placeholder="홍길동" required>
                            </div>
                            <div class="input-group">
                                <label>연락처</label>
                                <input type="tel" name="user-phone" placeholder="010-0000-0000" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>브랜드 및 제품명</label>
                            <input type="text" name="product-name" placeholder="예: 샤넬 클래식 미디움 블랙 금장" required>
                        </div>
                        <div class="input-group">
                            <label>제품 상태</label>
                            <select name="condition">
                                <option value="new">새제품 (미사용)</option>
                                <option value="like-new">신품급 (1-2회 사용)</option>
                                <option value="used">중고 (사용감 있음)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-accent full-width">무료 견적 신청하기</button>
                        <p class="form-notice">* 개인정보는 상담 완료 후 즉시 파기됩니다.</p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Comment Section -->
    <section class="comment-section container">
        <h3>방문자 후기 및 문의</h3>
        <form id="comment-form" class="comment-form">
            <input type="text" id="comment-name" placeholder="성함" required>
            <textarea id="comment-content" placeholder="내용을 입력해주세요" required></textarea>
            <button type="submit" class="btn btn-accent">등록하기</button>
        </form>
        <div id="comment-list" class="comment-list">
            <!-- Comments will be loaded here -->
        </div>
    </section>

    <!-- Location Section -->
    <section class="location-section container">
        <h3>찾아오시는 길</h3>
        <p class="address">서울특별시 종로구 창경궁로 109 세운스퀘어</p>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.339237256242!2d126.99516631189456!3d37.57064227203112!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2e6398935c3%3A0x6b7264858b975003!2z7IS47Jq07Iqk7YCY7Ja0!5e0!3m2!1sko!2skr!4v1710580000000!5m2!1sko!2skr" 
                width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
